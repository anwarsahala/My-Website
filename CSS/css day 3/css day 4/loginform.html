<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <div class="box">
        <form>
            <h1>Login</h1>
            <div>
            <label for="first" style="display: block; margin-bottom: 10px;">Username</label>
            <input type="text" placeholder="Enter your Username">
            </div>

            <div>
            <label for="password" style="display: block; margin-bottom: 10px;">Password</label>
            <input type="password" placeholder="Enter your Password">
            </div>

            <button style="width: 100%; height: 40px; font-size: 20px; background-color: #495bfe; color: white; font-weight: bold; border: none; border-radius: 5px;">Login</button>

        </form>
    </div>
    
</body>
</html>
