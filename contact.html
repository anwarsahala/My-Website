        <h1>Get in Touch</h1>
        <p>Whether you are looking to hire a technical Project Manager, discuss agile workflows, or review my learning progress, let's connect.</p>

        <section>
            
            <form action="https://formspree.io/f/mnqkykqk" method="POST">
                <div>
                    <label for="name">Your Name:</label><br>
                    <input type="text" id="name" name="name" required>
                </div>
                <br>
                <div>
                    <label for="email">Your Email:</label><br>
                    <input type="email" id="email" name="email" required>
                </div>
                <br>
                <div>
                    <label for="message">Your Message:</label><br>
                    <textarea id="message" name="message" rows="5" cols="30" required></textarea>
                </div>
                <br>
                <div>
                    <button type="submit">Send Message</button>
                </div>
            </form>
        </section>
